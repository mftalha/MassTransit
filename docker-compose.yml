version: '3.8'

services:
  # 1. Redis Stream Buffer
  redis:
    image: redis:alpine
    container_name: payment-redis
    ports:
      - "6379:6379"

  # 1.5. Redis Exporter (Redis'i Prometheus'a bağlayan çevirmen)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: payment-redis-exporter
    environment:
      - REDIS_ADDR=redis://payment-redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # 2. RabbitMQ Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: payment-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  # 3. Prometheus (Veri Toplayıcı)
  prometheus:
    image: prom/prometheus:latest
    container_name: payment-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 4. Grafana (Görselleştirme)
  grafana:
    image: grafana/grafana:latest
    container_name: payment-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # 5. cAdvisor (CPU, RAM ve Docker Sistem İzleme)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0  # VERSİYONU BURADAN GÜNCELLEDİK
    container_name: payment-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true